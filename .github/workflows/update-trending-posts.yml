name: Update Trending Posts

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: '0 */8 * * *' # Runs every 8 hours

jobs:
  update-trending:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.3'

    - name: Install dependencies
      run: |
        pip install uv
        uv pip install --system python-dotenv google-generativeai requests beautifulsoup4 ddgs google-adk

    - name: Run update script
      env:
        GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY }}
        GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        GITHUB_ACTIONS: true
        PYTHONIOENCODING: "utf-8"
      run: python scripts/update_trending_posts.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add elijahmondero/public/posts/trending_posts.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update trending posts [skip ci]" && git push)
